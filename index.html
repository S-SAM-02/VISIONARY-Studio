<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — VISIONARY STUDIO</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body::after { display: none; }

    /* 3D canvas background */
    #bg3d {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .welcome-page {
      cursor: default;
      background: #050508;
    }

    .welcome-page::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #00f5ff 30%, #c8102e 50%, #b464ff 70%, transparent 100%);
      z-index: 100;
      animation: neonLine 4s ease-in-out infinite;
    }

    @keyframes neonLine {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1;   }
    }

    /* Welcome eyebrow */
    .welcome-eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #00f5ff;
      text-shadow: 0 0 18px rgba(0,245,255,0.8), 0 0 40px rgba(0,245,255,0.4);
      margin-bottom: 1.2rem;
      animation: fadeInDown 1s ease 0.2s both;
    }

    /* Logo neon split */
    .welcome-logo span:first-child {
      color: #ffffff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.6),
        0 0 60px rgba(0,245,255,0.3);
    }
    .welcome-logo span:last-child {
      color: #c8102e;
      text-shadow:
        0 0 20px rgba(200,16,46,0.9),
        0 0 60px rgba(200,16,46,0.5),
        0 0 120px rgba(200,16,46,0.2);
    }

    /* Enter button neon */
    .enter-btn {
      border: 1px solid rgba(0,245,255,0.5);
      color: #00f5ff;
      text-shadow: 0 0 10px rgba(0,245,255,0.6);
      box-shadow: 0 0 20px rgba(0,245,255,0.1), inset 0 0 20px rgba(0,245,255,0.05);
    }
    .enter-btn::after {
      background: radial-gradient(ellipse, rgba(0,245,255,0.4) 0%, transparent 70%);
    }
    .enter-btn:hover {
      border-color: #00f5ff;
      color: #ffffff;
      box-shadow:
        0 0 30px rgba(0,245,255,0.4),
        0 0 60px rgba(0,245,255,0.2),
        inset 0 0 30px rgba(0,245,255,0.1);
      text-shadow: 0 0 10px #fff;
    }

    /* Tagline */
    .welcome-tagline {
      color: rgba(200,200,220,0.7);
      font-style: italic;
    }

    /* Corner scan lines decorative */
    .corner-tl, .corner-tr, .corner-bl, .corner-br {
      position: fixed;
      width: 40px; height: 40px;
      z-index: 50;
      pointer-events: none;
    }
    .corner-tl { top: 20px; left: 20px;  border-top: 1px solid #00f5ff; border-left: 1px solid #00f5ff; }
    .corner-tr { top: 20px; right: 20px; border-top: 1px solid #00f5ff; border-right: 1px solid #00f5ff; }
    .corner-bl { bottom: 20px; left: 20px;  border-bottom: 1px solid #c8102e; border-left: 1px solid #c8102e; }
    .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid #c8102e; border-right: 1px solid #c8102e; }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.04) 3px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Fade transition */
    .page-fade {
      position: fixed;
      inset: 0;
      background: #050508;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.7s ease;
    }
    .page-fade.fading {
      opacity: 1;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <!-- 3D Background Canvas -->
  <canvas id="bg3d"></canvas>

  <!-- Scanline texture -->
  <div class="scanlines"></div>

  <!-- Corner brackets -->
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <!-- Page fade overlay -->
  <div class="page-fade" id="pageFade"></div>

  <div class="welcome-page">
    <div class="welcome-content">
      <p class="welcome-eyebrow">✦ &nbsp; Welcome to &nbsp; ✦</p>
      <h1 class="welcome-logo">
        <span>CINE</span><span>VISION</span>
      </h1>
      <p class="welcome-tagline">"Capturing Love, Stories &amp; Timeless Moments"</p>
      <a href="index.html" class="enter-btn" id="enterBtn">
        ENTER STUDIO &nbsp;→
      </a>
    </div>

    <p class="welcome-footer">CINEVISION STUDIO — BENGALURU, INDIA</p>
  </div>

  <script src="js/app.js"></script>
  <script src="js/bg3d.js"></script>
  <script>
    const enterBtn = document.getElementById('enterBtn');
    const pageFade = document.getElementById('pageFade');
    if (enterBtn) {
      enterBtn.addEventListener('click', function(e) {
        e.preventDefault();
        pageFade.classList.add('fading');
        setTimeout(() => { window.location.href = 'main.html'; }, 700);
      });
    }
  </script>
</body>
</html>
